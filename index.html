<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE 羽球館 - 自動租借系統</title>
    <!-- 引入 Noto Sans TC 高品質字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 比例優化：Google Sites 嵌入寬度適配 */
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .shadow-premium {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
                star: "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
                info: "M12 16h.01M12 8h.01M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z",
                user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
                shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
                checkCircle: "M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3",
                arrowLeft: "M19 12H5M12 19l-7-7 7-7",
                minus: "M5 12h14",
                plus: "M12 5v14M5 12h14",
                check: "M20 6L9 17l-5-5",
                clock: "M12 6v6l4 2M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z",
                sparkles: "M12 3l1.912 3.874 4.276.621-3.094 3.016.73 4.259L12 12.759l-3.824 2.011.73-4.259-3.094-3.016 4.276-.621L12 3z",
                x: "M18 6L6 18M6 6l12 12",
                send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z",
                key: "M21 2l-2 2M15 8l-9 9M9 14l-4 4"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={icons[name] || ""} />
                </svg>
            );
        };

        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
        const COURTS_DATA = [
            { id: 1, name: "1 號球場" }, { id: 2, name: "2 號球場" },
            { id: 3, name: "3 號球場" }, { id: 4, name: "4 號球場" },
            { id: 5, name: "5 號球場" }, { id: 6, name: "6 號球場" }
        ];
        const TIME_SLOTS = ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00"];

        const App = () => {
            const [step, setStep] = useState(1);
            const [isReadTerms, setIsReadTerms] = useState(false);
            const [isAgreedReg, setIsAgreedReg] = useState(false);
            const [timeLeft, setTimeLeft] = useState(600);
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedCourtId, setSelectedCourtId] = useState(null);
            const [selectedTimes, setSelectedTimes] = useState([]);
            const [bookingType, setBookingType] = useState('general');
            const [equipmentCount, setEquipmentCount] = useState(0);
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [aiInput, setAiInput] = useState("");
            const [aiMessages, setAiMessages] = useState([{ role: 'ai', text: "您好！我是 ACE 智慧助手。有關於預約、折扣或智慧指令的問題嗎？✨" }]);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [trainingPlan, setTrainingPlan] = useState("");
            const [bookingData, setBookingData] = useState({ court: '', times: [], date: '', totalPrice: 0, type: 'general', equipmentSets: 0 });

            useEffect(() => {
                let timer;
                if (step === 10 && timeLeft > 0) timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [step, timeLeft]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const getSlotPrice = (dateStr, slot, type) => {
                if (!dateStr) return 300;
                const date = new Date(dateStr);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const hour = parseInt(slot.split(':')[0]);
                let base = (isWeekend ? (hour >= 12 ? 500 : 300) : (hour >= 18 ? 500 : 300));
                return type === 'teaching' ? base - 50 : base;
            };

            const handleBookingSubmit = () => {
                if (selectedTimes.length === 0) return;
                let subtotal = 0;
                selectedTimes.forEach(t => subtotal += getSlotPrice(selectedDate, t, bookingType));
                setBookingData({
                    court: COURTS_DATA.find(c => c.id === selectedCourtId).name,
                    times: selectedTimes, date: selectedDate, totalPrice: subtotal + (equipmentCount * 50),
                    type: bookingType, equipmentSets: equipmentCount
                });
                setStep(10);
            };

            const toggleTimeSelection = (courtId, slot) => {
                if (selectedCourtId !== courtId) {
                    setSelectedCourtId(courtId);
                    setSelectedTimes([slot]);
                } else {
                    setSelectedTimes(prev => prev.includes(slot) ? prev.filter(t => t !== slot) : [...prev, slot].sort());
                }
            };

            const callGemini = async (prompt, sys = "") => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: sys }] } })
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { return "教練目前忙碌中。"; }
            };

            const handleAiChat = async () => {
                if (!aiInput.trim()) return;
                setAiMessages(prev => [...prev, { role: 'user', text: aiInput }]);
                setAiInput(""); setIsAiLoading(true);
                const res = await callGemini(aiInput, "你是 ACE 智慧教練，請用繁體中文回答。告知前後 15 分鐘冷氣自動開啟。");
                setAiMessages(prev => [...prev, { role: 'ai', text: res || "連線異常。" }]);
                setIsAiLoading(false);
            };

            useEffect(() => {
                if (step === 12) {
                    const fetchMenu = async () => {
                        const res = await callGemini("我今天預約了球場，請給我一個小時的專業羽球訓練菜單。", "你是專業 ACE 羽球教練。");
                        setTrainingPlan(res);
                    };
                    fetchMenu();
                }
            }, [step]);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-40 h-16 sm:h-20 shadow-sm">
                        <div className="page-container h-full flex items-center justify-between">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setStep(1)}>
                                <div className="w-8 h-8 sm:w-10 sm:h-10 bg-rose-500 rounded-lg flex items-center justify-center text-white">
                                    <Icon name="zap" size={20} />
                                </div>
                                <span className="text-xl sm:text-2xl font-bold tracking-tight text-slate-800">ACE<span className="text-rose-500">Court</span></span>
                            </div>
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                <button onClick={() => setIsAiOpen(true)} className="p-2 text-slate-500 hover:text-rose-500 transition-colors">
                                    <Icon name="sparkles" size={20} />
                                </button>
                                <button onClick={() => setStep(3)} className="bg-slate-900 text-white px-4 py-1.5 sm:px-6 sm:py-2 rounded-full text-sm font-medium hover:bg-slate-800 transition-all">登入</button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="page-container py-8 sm:py-12">
                        {/* Step 1: Landing */}
                        {step === 1 && (
                            <div className="max-w-3xl mx-auto text-center py-16 sm:py-20">
                                <div className="inline-block p-4 bg-rose-50 rounded-full text-rose-500 mb-6">
                                    <Icon name="zap" size={40} />
                                </div>
                                <h1 className="text-4xl sm:text-6xl font-black text-slate-900 mb-6 leading-tight">智慧羽球預約<br/>ACE 新體驗</h1>
                                <p className="text-lg text-slate-500 mb-10 max-w-lg mx-auto">無人化智慧管理、即時預約、雲端門禁控制，讓打球變得更簡單。</p>
                                <button onClick={() => setStep(2)} className="bg-rose-500 text-white px-10 py-4 rounded-full text-xl font-bold shadow-lg hover:bg-rose-600 transition-all">立即預約</button>
                            </div>
                        )}

                        {/* Step 2: Terms */}
                        {step === 2 && (
                            <div className="max-w-4xl mx-auto bg-white rounded-3xl p-6 sm:p-10 shadow-premium border">
                                <h2 className="text-2xl font-bold text-slate-800 mb-8 flex items-center">
                                    <Icon name="info" size={24} className="mr-3 text-rose-500" /> 租借須知
                                </h2>
                                <div className="grid md:grid-cols-2 gap-8 mb-8">
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-slate-700">💰 收費標準</h3>
                                        <div className="bg-slate-50 p-6 rounded-2xl space-y-3 text-sm">
                                            <div className="flex justify-between"><span>離峰時段</span><span className="font-bold text-slate-900">$300/H</span></div>
                                            <div className="flex justify-between"><span>尖峰時段</span><span className="font-bold text-rose-600">$500/H</span></div>
                                            <div className="flex justify-between text-rose-500"><span>教學優惠</span><span className="font-bold">-$50/H</span></div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h3 className="font-bold text-slate-700">⚡ 門禁規則</h3>
                                        <ul className="text-slate-600 space-y-2 text-sm leading-relaxed">
                                            <li>• 隨機密碼於開場前 30 分鐘寄發簡訊。</li>
                                            <li>• 前後 15 分鐘冷氣自動連動開啟。</li>
                                            <li>• 誤用教學折扣經查無實事罰 5 倍場租。</li>
                                        </ul>
                                    </div>
                                </div>
                                <label className="flex items-center p-5 bg-rose-50 rounded-2xl cursor-pointer hover:bg-rose-100 transition-colors mb-8">
                                    <input type="checkbox" className="w-5 h-5 accent-rose-500" checked={isReadTerms} onChange={(e) => setIsReadTerms(e.target.checked)} />
                                    <span className="ml-4 text-slate-700 text-sm font-medium">我已詳閱預約規則、退費政策與罰則聲明</span>
                                </label>
                                <button disabled={!isReadTerms} onClick={() => setStep(3)} className={`w-full py-4 rounded-xl font-bold transition-all ${isReadTerms ? 'bg-slate-900 text-white hover:bg-black' : 'bg-slate-100 text-slate-300'}`}>進入系統</button>
                            </div>
                        )}

                        {/* Step 3: Login (原版樣式回歸) */}
                        {step === 3 && (
                            <div className="max-w-md mx-auto bg-white rounded-3xl p-8 sm:p-10 shadow-premium border">
                                <div className="flex flex-col items-center mb-8">
                                    <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mb-4">
                                        <Icon name="user" size={32} />
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-800">會員登入</h2>
                                </div>
                                <div className="space-y-5">
                                    <input type="text" className="w-full px-5 py-3 rounded-xl border bg-slate-50 focus:bg-white focus:border-rose-400 outline-none transition-all text-sm" placeholder="身分證號 / 手機號碼" />
                                    <input type="password" placeholder="密碼 Password" className="w-full px-5 py-3 rounded-xl border bg-slate-50 focus:bg-white focus:border-rose-400 outline-none transition-all text-sm" />
                                    <div className="flex justify-end">
                                        <button onClick={() => setStep(13)} className="text-xs text-rose-500 font-bold hover:underline">忘記密碼？</button>
                                    </div>
                                    <button onClick={() => setStep(7)} className="w-full py-3.5 rounded-full bg-rose-500 text-white font-bold hover:bg-rose-600 shadow-lg shadow-rose-100 transition-all">登入系統</button>
                                    <button onClick={() => setStep(4)} className="w-full py-3 rounded-full border border-slate-200 text-slate-500 text-sm font-bold hover:bg-slate-50 transition-all">註冊新會員 Join ACE</button>
                                </div>
                            </div>
                        )}

                        {/* Step 4: Reg Policy (補回) */}
                        {step === 4 && (
                            <div className="max-w-2xl mx-auto bg-white rounded-3xl p-8 shadow-premium border">
                                <h2 className="text-2xl font-bold mb-6 flex items-center"><Icon name="shield" size={24} className="mr-2 text-rose-500" /> 註冊協定與隱私政策</h2>
                                <div className="h-64 overflow-y-auto p-5 bg-slate-50 rounded-xl text-sm text-slate-600 leading-loose mb-8 custom-scrollbar border">
                                    <p className="font-bold text-rose-600 mb-2">★ 法律重要告知：</p>
                                    <p>1. 本場館採無人化管理，租借即代表同意場內錄影監控。</p>
                                    <p>2. 預約後 3 日內可全額退費，超過則轉為場地抵用券。</p>
                                    <p>3. 禁止在場館內菸酒、外食或進行非法行為。</p>
                                    <p>4. 誤用教學折扣查實後將處以原價 5 倍罰金，並暫停會員資格。</p>
                                    <p>5. 您所填寫的個人資料僅用於預約管理與簡訊發送。</p>
                                </div>
                                <label className="flex items-center mb-8 cursor-pointer">
                                    <input type="checkbox" className="w-5 h-5 accent-rose-500" checked={isAgreedReg} onChange={(e) => setIsAgreedReg(e.target.checked)} />
                                    <span className="ml-3 text-sm font-medium text-slate-700">我同意上述所有規範與罰則</span>
                                </label>
                                <div className="flex space-x-3">
                                    <button onClick={() => setStep(3)} className="flex-1 py-3 text-slate-400 font-bold text-sm">返回</button>
                                    <button disabled={!isAgreedReg} onClick={() => setStep(5)} className={`flex-[2] py-3 rounded-full font-bold transition-all ${isAgreedReg ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-300'}`}>下一步</button>
                                </div>
                            </div>
                        )}

                        {/* Step 5: Reg Form (補回) */}
                        {step === 5 && (
                            <div className="max-w-2xl mx-auto bg-white rounded-3xl p-8 shadow-premium border">
                                <h2 className="text-2xl font-bold mb-8">建立新帳號</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 text-left">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block ml-2">姓名</label>
                                        <input type="text" className="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-rose-400 text-sm" placeholder="全名" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block ml-2">手機號碼 (接收密碼用)</label>
                                        <input type="tel" className="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-rose-400 text-sm" placeholder="0900-000-000" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block ml-2">身分證字號</label>
                                        <input type="text" className="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-rose-400 text-sm" placeholder="A123456789" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block ml-2">Email</label>
                                        <input type="email" className="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-rose-400 text-sm" placeholder="example@mail.com" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block ml-2">設定密碼</label>
                                        <input type="password" className="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-rose-400 text-sm" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 mb-1 block ml-2">確認密碼</label>
                                        <input type="password" className="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-rose-400 text-sm" />
                                    </div>
                                </div>
                                <button onClick={() => setStep(6)} className="w-full mt-10 py-4 bg-rose-500 text-white rounded-full font-bold hover:bg-rose-600 transition-all">完成註冊</button>
                            </div>
                        )}

                        {/* Step 6: Reg Success (補回) */}
                        {step === 6 && (
                            <div className="max-w-md mx-auto text-center py-20">
                                <div className="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="checkCircle" size={40} />
                                </div>
                                <h2 className="text-3xl font-bold mb-4">帳號建立成功</h2>
                                <p className="text-slate-500 mb-10">歡迎加入 ACE Court，現在可以開始預約您的專屬場地。</p>
                                <button onClick={() => setStep(3)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">前往登入</button>
                            </div>
                        )}

                        {/* Step 7: Calendar */}
                        {step === 7 && (
                            <div className="max-w-4xl mx-auto bg-white rounded-3xl p-6 sm:p-10 shadow-premium border">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                                    <h2 className="text-2xl font-bold">選擇預約日期</h2>
                                    <div className="text-rose-500 font-bold bg-rose-50 px-4 py-2 rounded-xl text-sm">2024 年 11 月</div>
                                </div>
                                <div className="grid grid-cols-7 gap-2 mb-4 text-center text-slate-400 font-bold text-xs">
                                    {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d}>{d}</div>)}
                                </div>
                                <div className="grid grid-cols-7 gap-2 sm:gap-3">
                                    {Array.from({ length: 30 }, (_, i) => i + 1).map(day => (
                                        <button key={day} onClick={() => { setSelectedDate(`2024-11-${day.toString().padStart(2, '0')}`); setStep(9); }} 
                                            className={`aspect-square rounded-xl flex items-center justify-center font-bold text-sm sm:text-lg border transition-all ${[5,12,19,25].includes(day) ? 'bg-slate-50 border-slate-50 text-slate-200 cursor-not-allowed' : 'bg-white border-slate-200 text-slate-700 hover:border-rose-500 hover:bg-rose-50'}`}> {day} </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Step 9: Selection */}
                        {step === 9 && (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div>
                                        <button onClick={() => setStep(7)} className="flex items-center text-slate-400 mb-2 hover:text-rose-500 text-sm font-bold">
                                            <Icon name="arrowLeft" size={16} className="mr-2" /> 回到行事曆
                                        </button>
                                        <h2 className="text-2xl sm:text-3xl font-bold text-slate-800">{selectedDate} 場地時段選取</h2>
                                    </div>
                                    <div className="flex bg-white p-1.5 rounded-xl border space-x-1">
                                        <button onClick={() => setBookingType('general')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${bookingType === 'general' ? 'bg-slate-900 text-white' : 'text-slate-500'}`}>一般租場</button>
                                        <button onClick={() => setBookingType('teaching')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${bookingType === 'teaching' ? 'bg-rose-500 text-white' : 'text-slate-500'}`}>教學優惠 (-50)</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {COURTS_DATA.map(court => (
                                        <div key={court.id} className={`bg-white p-5 rounded-2xl border-2 transition-all ${selectedCourtId === court.id ? 'border-rose-400 shadow-md' : 'border-slate-100'}`}>
                                            <h3 className="text-lg font-bold text-slate-800 mb-4">{court.name}</h3>
                                            <div className="grid grid-cols-3 gap-1.5">
                                                {TIME_SLOTS.map(time => {
                                                    const isSelected = selectedCourtId === court.id && selectedTimes.includes(time);
                                                    return (
                                                        <button key={time} onClick={() => toggleTimeSelection(court.id, time)} 
                                                            className={`py-2.5 rounded-lg border text-[11px] sm:text-xs font-bold transition-all ${isSelected ? 'bg-rose-500 border-rose-500 text-white' : 'bg-white border-slate-100 text-slate-400 hover:border-rose-200'}`}>
                                                            {time}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {selectedTimes.length > 0 && (
                                    <div className="fixed bottom-0 left-0 w-full bg-white border-t p-4 sm:p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-50">
                                        <div className="page-container flex items-center justify-between">
                                            <div className="text-left">
                                                <p className="text-slate-400 text-xs font-bold">已選 {selectedTimes.length} 個時段</p>
                                                <p className="text-xl sm:text-2xl font-black text-slate-900">總計 NT$ {selectedTimes.reduce((acc, t) => acc + getSlotPrice(selectedDate, t, bookingType), 0)}</p>
                                            </div>
                                            <button onClick={handleBookingSubmit} className="bg-rose-500 text-white px-8 py-3 rounded-full font-bold text-sm sm:text-base hover:bg-rose-600 transition-all shadow-lg">確認預約</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Step 10: Timer */}
                        {step === 10 && (
                            <div className="max-w-lg mx-auto bg-white rounded-3xl p-8 sm:p-10 shadow-premium border text-center">
                                <div className="w-16 h-16 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 animate-pulse">
                                    <Icon name="clock" size={32} />
                                </div>
                                <h2 className="text-xl font-bold mb-2 text-slate-800">付款時限保留中</h2>
                                <p className="text-orange-500 font-bold text-2xl mb-8 font-mono">{formatTime(timeLeft)}</p>
                                <div className="bg-slate-50 p-6 rounded-2xl mb-8 space-y-3 text-left text-sm border">
                                    <div className="flex justify-between"><span>預約場地</span><span className="font-bold">{bookingData.court}</span></div>
                                    <div className="flex justify-between"><span>日期</span><span className="font-bold">{bookingData.date}</span></div>
                                    <div className="flex justify-between"><span>時段</span><span className="font-bold text-right">{bookingData.times.join(', ')}</span></div>
                                    <div className="border-t pt-3 flex justify-between text-lg font-bold text-rose-600"><span>應付總額</span><span>NT$ {bookingData.totalPrice}</span></div>
                                </div>
                                <button onClick={()=>setStep(11)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-all">前往刷卡付款</button>
                            </div>
                        )}

                        {/* Step 11: Payment (補回畫面) */}
                        {step === 11 && (
                            <div className="max-w-md mx-auto bg-white rounded-3xl p-8 shadow-premium border">
                                <h2 className="text-xl font-bold mb-8 text-center">信用卡支付</h2>
                                <div className="space-y-4">
                                    <input type="text" className="w-full px-4 py-3 rounded-xl border bg-slate-50 outline-none" placeholder="卡號 **** **** **** ****" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" className="w-full px-4 py-3 rounded-xl border bg-slate-50 outline-none" placeholder="MM/YY" />
                                        <input type="text" className="w-full px-4 py-3 rounded-xl border bg-slate-50 outline-none" placeholder="CVV" />
                                    </div>
                                    <button onClick={()=>setStep(12)} className="w-full mt-6 py-4 bg-slate-900 text-white rounded-xl font-bold">確認付款 NT$ {bookingData.totalPrice}</button>
                                </div>
                            </div>
                        )}

                        {/* Step 12: Success */}
                        {step === 12 && (
                            <div className="max-w-2xl mx-auto text-center py-10">
                                <div className="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="checkCircle" size={40} />
                                </div>
                                <h2 className="text-3xl font-bold text-slate-800 mb-4">預約成功！</h2>
                                <p className="text-slate-500 text-lg mb-10">系統已完成場地保留，請留意手機簡訊密碼通知。</p>
                                <div className="bg-white p-6 sm:p-8 rounded-3xl border border-rose-100 text-left mb-10 shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="sparkles" size={60} /></div>
                                    <div className="flex items-center text-rose-500 font-bold mb-4">
                                        <Icon name="sparkles" size={18} className="mr-2" /> ACE AI 專業訓練建議
                                    </div>
                                    <div className="text-slate-600 text-sm leading-relaxed whitespace-pre-line">
                                        {trainingPlan || "正在分析您的場次並生成菜單..."}
                                    </div>
                                </div>
                                <button onClick={() => location.reload()} className="bg-slate-900 text-white px-10 py-3 rounded-full font-bold shadow-lg">回到首頁</button>
                            </div>
                        )}

                        {/* Step 13: Forgot Password (補回) */}
                        {step === 13 && (
                            <div className="max-w-md mx-auto bg-white rounded-3xl p-8 sm:p-10 shadow-premium border">
                                <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="key" size={32} />
                                </div>
                                <h2 className="text-2xl font-bold mb-4 text-center">重設密碼</h2>
                                <p className="text-slate-400 text-sm text-center mb-8">請輸入註冊的手機號碼，我們將寄送簡訊連結給您。</p>
                                <input type="tel" className="w-full px-5 py-3 rounded-xl border bg-slate-50 focus:border-rose-400 outline-none mb-6" placeholder="手機號碼 09XX-XXX-XXX" />
                                <button onClick={() => setStep(3)} className="w-full py-4 bg-rose-500 text-white rounded-full font-bold hover:bg-rose-600 transition-all mb-4">發送重設連結</button>
                                <button onClick={() => setStep(3)} className="w-full text-slate-400 text-sm font-bold">返回登入</button>
                            </div>
                        )}
                    </main>

                    {/* AI Assistant */}
                    {isAiOpen && (
                        <div className="fixed bottom-6 right-6 z-50 w-[350px] sm:w-[380px] h-[500px] bg-white rounded-3xl shadow-2xl border flex flex-col overflow-hidden animate-in slide-in-from-right-10">
                            <div className="bg-slate-900 p-4 sm:p-5 flex items-center justify-between text-white">
                                <div className="flex items-center space-x-3">
                                    <Icon name="sparkles" size={18} className="text-rose-500" />
                                    <span className="font-bold text-sm">ACE AI 智慧助理</span>
                                </div>
                                <button onClick={() => setIsAiOpen(false)} className="opacity-70 hover:opacity-100"><Icon name="x" size={18} /></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 custom-scrollbar">
                                {aiMessages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] px-4 py-2 rounded-2xl text-xs sm:text-sm leading-relaxed ${msg.role === 'user' ? 'bg-rose-500 text-white rounded-tr-none' : 'bg-white text-slate-700 rounded-tl-none border shadow-sm'}`}>{msg.text}</div>
                                    </div>
                                ))}
                                {isAiLoading && <div className="text-slate-400 text-[10px] animate-pulse">正在輸入中...</div>}
                            </div>
                            <div className="p-3 bg-white border-t flex items-center space-x-2">
                                <input type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAiChat()} placeholder="問點羽球問題..." className="flex-1 bg-slate-100 px-4 py-2 rounded-full text-sm outline-none focus:bg-white focus:ring-1 focus:ring-rose-500 transition-all" />
                                <button onClick={handleAiChat} disabled={isAiLoading || !aiInput.trim()} className="bg-rose-500 text-white p-2 rounded-full shadow-md"><Icon name="send" size={16} /></button>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t py-12 text-center mt-12 mb-20 sm:mb-0">
                        <div className="page-container">
                            <div className="flex justify-center space-x-6 mb-6 text-slate-300">
                                <Icon name="zap" size={20} /> <Icon name="star" size={20} /> <Icon name="shield" size={20} />
                            </div>
                            <p className="text-slate-400 text-[10px] sm:text-xs font-bold uppercase tracking-widest">© 2024 ACE COURT BADMINTON. POWERED BY SMART SYSTEM.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
